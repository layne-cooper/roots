<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Roots Bowl Builder - Calculate nutrition for your custom bowl">
    <title>Roots Bowl Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <div class="container">
        <header>
            <h1>🥗 Roots Bowl Builder</h1>
            <p class="subtitle">Build your perfect bowl and track your nutrition</p>
        </header>

        <div class="nutrition-panel" id="nutritionPanel">
            <div class="panel-header">
                <span class="panel-title">📊 Nutrition Summary</span>
                <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                    <div class="toggle-container">
                        <span class="toggle-label">👶 Kids Bowl</span>
                        <label class="toggle">
                            <input type="checkbox" id="kidsBowl">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <button class="clear-btn" id="clearBtn">Clear All</button>
                </div>
            </div>
            <div class="nutrition-stats">
                <div class="stat-card">
                    <div class="stat-label">Calories</div>
                    <div class="stat-value" id="totalCalories">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Protein</div>
                    <div class="stat-value" id="totalProtein">0<span class="stat-unit">g</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Fat</div>
                    <div class="stat-value" id="totalFat">0<span class="stat-unit">g</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Carbs</div>
                    <div class="stat-value" id="totalCarbs">0<span class="stat-unit">g</span></div>
                </div>
            </div>
        </div>

        <div class="categories" id="categories">
            <!-- Categories will be populated by JavaScript -->
        </div>

        <footer>
            <p>Nutritional values are approximate and may vary.</p>
        </footer>
    </div>

    <script>
        // Nutrition data from CSV
        const ingredients = [
            // Bases
            { name: "Brown Rice", category: "Bases", calories: 177, carbs: 37, protein: 4, fat: 2 },
            { name: "Roots Rice", category: "Bases", calories: 173, carbs: 36, protein: 4, fat: 2 },
            { name: "Bulgur", category: "Bases", calories: 58, carbs: 13, protein: 2, fat: 0 },
            { name: "Kale", category: "Bases", calories: 49, carbs: 10, protein: 3, fat: 0 },
            { name: "Spinach", category: "Bases", calories: 20, carbs: 3, protein: 3, fat: 0 },
            { name: "Arcadian Mix", category: "Bases", calories: 22, carbs: 5, protein: 1, fat: 0 },
            // Ingredients
            { name: "Kimchi", category: "Ingredients", calories: 26, carbs: 8, protein: 6, fat: 0 },
            { name: "Sweet Potatoes", category: "Ingredients", calories: 92, carbs: 14, protein: 1, fat: 3 },
            { name: "Broccoli", category: "Ingredients", calories: 27, carbs: 3, protein: 1, fat: 4 },
            { name: "Beets", category: "Ingredients", calories: 35, carbs: 5, protein: 1, fat: 1 },
            { name: "Black Beans", category: "Ingredients", calories: 47, carbs: 9, protein: 3, fat: 0 },
            { name: "Chickpeas", category: "Ingredients", calories: 55, carbs: 10, protein: 3, fat: 1 },
            { name: "White Beans", category: "Ingredients", calories: 56, carbs: 10, protein: 4, fat: 0 },
            { name: "Cucumbers", category: "Ingredients", calories: 7, carbs: 2, protein: 0, fat: 0 },
            { name: "Tomatoes", category: "Ingredients", calories: 8, carbs: 2, protein: 0, fat: 0 },
            { name: "Red Onions", category: "Ingredients", calories: 10, carbs: 2, protein: 0, fat: 0 },
            { name: "Avocado", category: "Ingredients", calories: 81, carbs: 4, protein: 2, fat: 7 },
            { name: "Goat Cheese", category: "Ingredients", calories: 86, carbs: 3, protein: 5, fat: 6 },
            { name: "Parmesan", category: "Ingredients", calories: 104, carbs: 0, protein: 8, fat: 6 },
            { name: "Feta", category: "Ingredients", calories: 75, carbs: 2, protein: 5, fat: 6 },
            { name: "White Cheddar", category: "Ingredients", calories: 84, carbs: 2, protein: 6, fat: 5 },
            { name: "Hard-Boiled Egg", category: "Ingredients", calories: 77, carbs: 1, protein: 6, fat: 5 },
            { name: "Charred Corn", category: "Ingredients", calories: 56, carbs: 7, protein: 1, fat: 3 },
            { name: "Craisins", category: "Ingredients", calories: 77, carbs: 21, protein: 0, fat: 1 },
            { name: "Almonds", category: "Ingredients", calories: 75, carbs: 3, protein: 3, fat: 7 },
            { name: "Pickled Onions", category: "Ingredients", calories: 12, carbs: 2, protein: 0, fat: 0 },
            { name: "Red Cabbage", category: "Ingredients", calories: 9, carbs: 2, protein: 0, fat: 0 },
            { name: "Carrots", category: "Ingredients", calories: 10, carbs: 2, protein: 0, fat: 0 },
            { name: "Jalapeños", category: "Ingredients", calories: 5, carbs: 3, protein: 0, fat: 0 },
            { name: "Pita Chips", category: "Ingredients", calories: 93, carbs: 14, protein: 2, fat: 4 },
            { name: "Honey Sesame Sticks", category: "Ingredients", calories: 106, carbs: 11, protein: 1, fat: 6 },
            // Proteins
            { name: "Adobo Chicken", category: "Proteins", calories: 140, carbs: 1, protein: 26, fat: 5 },
            { name: "Beef Barbacoa", category: "Proteins", calories: 211, carbs: 3, protein: 22, fat: 12 },
            { name: "Korean BBQ Chicken", category: "Proteins", calories: 160, carbs: 6, protein: 26, fat: 6 },
            { name: "BBQ Tofu", category: "Proteins", calories: 250, carbs: 25, protein: 14, fat: 12 },
            { name: "Mushrooms", category: "Proteins", calories: 123, carbs: 5, protein: 2, fat: 8 },
            // Dressings
            { name: "Cilantro Lime", category: "Dressings", calories: 127, carbs: 1, protein: 0, fat: 14 },
            { name: "Lemon Tahini", category: "Dressings", calories: 102, carbs: 3, protein: 1, fat: 10 },
            { name: "Pesto", category: "Dressings", calories: 149, carbs: 1, protein: 1, fat: 16 },
            { name: "Greek Feta", category: "Dressings", calories: 90, carbs: 1, protein: 1, fat: 9 },
            { name: "Caesar", category: "Dressings", calories: 143, carbs: 1, protein: 1, fat: 15 },
            { name: "Lemon Za'atar", category: "Dressings", calories: 124, carbs: 1, protein: 0, fat: 14 },
            { name: "Basil Balsamic", category: "Dressings", calories: 189, carbs: 3, protein: 0, fat: 20 },
            { name: "Miso Ginger", category: "Dressings", calories: 97, carbs: 2, protein: 0, fat: 10 },
            { name: "Sesame Caesar", category: "Dressings", calories: 93, carbs: 1, protein: 1, fat: 9 },
            { name: "EV Olive Oil", category: "Dressings", calories: 248, carbs: 0, protein: 0, fat: 28 },
            { name: "Red Wine Vinegar", category: "Dressings", calories: 6, carbs: 0, protein: 0, fat: 0 }
        ];

        // Group ingredients by category
        const categories = {};
        ingredients.forEach((ing, index) => {
            ing.index = index;
            if (!categories[ing.category]) {
                categories[ing.category] = [];
            }
            categories[ing.category].push(ing);
        });

        // Category order
        const categoryOrder = ["Bases", "Proteins", "Ingredients", "Dressings"];

        // Selected ingredients
        const selected = new Set();
        // Half portion ingredients
        const halfPortions = new Set();

        // Render categories
        function renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = '';

            categoryOrder.forEach(categoryName => {
                if (!categories[categoryName]) return;

                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';

                const items = categories[categoryName];
                categoryDiv.innerHTML = `
                    <div class="category-header">
                        <span class="category-title">${getCategoryIcon(categoryName)} ${categoryName}</span>
                        <span class="category-count">${items.length} items</span>
                    </div>
                    <div class="ingredients">
                        ${items.map(ing => `
                            <div class="ingredient" data-index="${ing.index}">
                                <div class="checkbox-custom">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </div>
                                <div class="ingredient-info">
                                    <div class="ingredient-name">${ing.name}</div>
                                    <div class="ingredient-calories">${ing.calories} cal</div>
                                </div>
                                <button class="half-btn" title="Half portion">½</button>
                            </div>
                        `).join('')}
                    </div>
                `;

                container.appendChild(categoryDiv);
            });

            // Add event listeners for ingredient selection
            document.querySelectorAll('.ingredient').forEach(el => {
                el.addEventListener('click', (e) => {
                    // Don't toggle if clicking half button
                    if (e.target.closest('.half-btn')) return;
                    e.preventDefault();
                    const index = parseInt(el.dataset.index);
                    toggleIngredient(index, el);
                });
            });

            // Add event listeners for half portion buttons
            document.querySelectorAll('.half-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const el = btn.closest('.ingredient');
                    const index = parseInt(el.dataset.index);
                    toggleHalfPortion(index, el, btn);
                });
            });
        }

        function getCategoryIcon(category) {
            const icons = {
                "Bases": "🍚",
                "Ingredients": "🥬",
                "Toppings": "🧀",
                "Roasted": "🥕",
                "Proteins": "🍗",
                "Dressings": "🍋"
            };
            return icons[category] || "🥗";
        }

        function toggleIngredient(index, element) {
            if (selected.has(index)) {
                selected.delete(index);
                halfPortions.delete(index);
                element.classList.remove('selected', 'half-portion');
                element.querySelector('.half-btn').classList.remove('active');
            } else {
                selected.add(index);
                element.classList.add('selected');
            }
            updateNutrition();
        }

        function toggleHalfPortion(index, element, btn) {
            if (!selected.has(index)) return;

            if (halfPortions.has(index)) {
                halfPortions.delete(index);
                element.classList.remove('half-portion');
                btn.classList.remove('active');
            } else {
                halfPortions.add(index);
                element.classList.add('half-portion');
                btn.classList.add('active');
            }
            updateNutrition();
        }

        function updateNutrition() {
            let totalCalories = 0;
            let totalProtein = 0;
            let totalFat = 0;
            let totalCarbs = 0;

            selected.forEach(index => {
                const ing = ingredients[index];
                const multiplier = halfPortions.has(index) ? 0.5 : 1;
                totalCalories += ing.calories * multiplier;
                totalProtein += ing.protein * multiplier;
                totalFat += ing.fat * multiplier;
                totalCarbs += ing.carbs * multiplier;
            });

            const isKids = document.getElementById('kidsBowl').checked;
            const panel = document.getElementById('nutritionPanel');

            if (isKids) {
                totalCalories = totalCalories / 2;
                totalProtein = totalProtein / 2;
                totalFat = totalFat / 2;
                totalCarbs = totalCarbs / 2;
                panel.classList.add('kids-active');
            } else {
                panel.classList.remove('kids-active');
            }

            // Update display with animation
            animateValue('totalCalories', Math.round(totalCalories));
            animateValue('totalProtein', Math.round(totalProtein * 10) / 10, 'g');
            animateValue('totalFat', Math.round(totalFat * 10) / 10, 'g');
            animateValue('totalCarbs', Math.round(totalCarbs * 10) / 10, 'g');
        }

        function animateValue(elementId, value, unit = '') {
            const el = document.getElementById(elementId);
            el.innerHTML = unit ? `${value}<span class="stat-unit">${unit}</span>` : value;
            el.classList.add('updated');
            setTimeout(() => el.classList.remove('updated'), 300);
        }

        // Event listeners
        document.getElementById('kidsBowl').addEventListener('change', updateNutrition);

        document.getElementById('clearBtn').addEventListener('click', () => {
            selected.clear();
            halfPortions.clear();
            document.querySelectorAll('.ingredient.selected').forEach(el => {
                el.classList.remove('selected', 'half-portion');
                el.querySelector('.half-btn').classList.remove('active');
            });
            updateNutrition();
        });

        // Initialize
        renderCategories();
    </script>
</body>

</html>
